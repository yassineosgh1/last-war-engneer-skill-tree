body{
    background:#1f2430;
    font-family:Arial;
    color:white;
    text-align:center;
}

.container{
    width:750px;
    margin:auto;
}

.header{
    font-size:28px;
    margin-bottom:20px;
}

.points{
    font-size:20px;
    margin-bottom:10px;
}

.reset{
    margin-bottom:25px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ff4757;
    color:white;
    cursor:pointer;
}

.reset:hover{
    background:#ff6b81;
}

.row{
    display:flex;
    align-items:center;
    margin:25px 0;
}

.level{
    width:60px;
    font-size:48px;
    color:#aaa;
}

.skills{
    display:flex;
    gap:15px;
}

.skill{
    width:180px;
    height:180px;
    background:#ff9f43;
    border-radius:12px;
    border:3px solid #444;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.skill.green{
    background:#2ecc71;
}

.icon{
    width:90px;
    height:90px;
}

.counter{
    font-size:48px;
    font-weight:bold;
    margin-top:6px;
    color:#555;   /* grey when 0 */
}

.skill:hover{
    transform:scale(1.05);
}

</style>
</head>

<script>
let points = 42;

function addPoint(skill,max){

let counter = skill.querySelector(".counter")
let current = parseInt(counter.innerText.split("/")[0])

if(current < max && points > 0){

current++
points--

counter.innerText = current + "/" + max

/* change color when upgraded */
if(current > 0){
counter.style.color = "#ffffff"
}

document.getElementById("points").innerText = points

}

}

function resetTree(){

points = 42
document.getElementById("points").innerText = points

let counters = document.querySelectorAll(".counter")

counters.forEach(counter=>{
    let max = counter.innerText.split("/")[1]
    counter.innerText = "0/" + max
    counter.style.color = "#555"
})

}

</script>
